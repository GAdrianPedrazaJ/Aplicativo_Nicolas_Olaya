name: Build and deploy (zip) to Azure Web App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (root)
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install server production deps
        run: |
          cd server
          npm ci --only=production

      - name: Prepare artifact
        run: |
          rm -rf artifact || true
          mkdir -p artifact
          cp -r dist artifact/
          cp -r server artifact/
          cp package.json artifact/
          cd artifact && zip -r ../artifact.zip .

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Deploy to Azure Web App (zip)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: artifact.zip
